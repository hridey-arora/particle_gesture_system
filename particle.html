<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Two-Hand Particle Control</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: black;
}

#webcam {
    position: absolute;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0.18;
    filter: brightness(1.25) contrast(1.15);
    z-index: 1;
}

canvas {
    position: absolute;
    inset: 0;
    z-index: 2;
    transform: scaleX(-1);
}
</style>
</head>

<body>

<video id="webcam" autoplay playsinline muted></video>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

<script>
/* ================= CAMERA ================= */
const video = document.getElementById("webcam");
navigator.mediaDevices.getUserMedia({ video: true })
.then(s => video.srcObject = s);

/* ================= THREE ================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth / innerHeight, 0.1, 1000);
camera.position.z = 55;

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const COUNT = 20000;

/* SHAPES */
const cloud = new Float32Array(COUNT * 3);
const sphere = new Float32Array(COUNT * 3);
const spiral = new Float32Array(COUNT * 3);
const pos = new Float32Array(COUNT * 3);
const burstDir = new Float32Array(COUNT * 3);

for (let i = 0; i < COUNT; i++) {
    const x = Math.random() - 0.5;
    const y = Math.random() - 0.5;
    const z = Math.random() - 0.5;
    const l = Math.hypot(x, y, z) + 0.0001;

    burstDir[i*3]   = x / l;
    burstDir[i*3+1] = y / l;
    burstDir[i*3+2] = z / l;
}

/* COMPACT CLOUD */
for (let i = 0; i < COUNT; i++) {
    cloud[i*3]   = (Math.random() - 0.5) * 5;
    cloud[i*3+1] = (Math.random() - 0.5) * 5;
    cloud[i*3+2] = (Math.random() - 0.5) * 5;
}

/* HOLLOW SPHERE */
for (let i = 0; i < COUNT; i++) {
    const u = Math.random();
    const v = Math.random();

    const theta = u * Math.PI * 2;
    const phi = Math.acos(2 * v - 1);

    const r = 14 + Math.random() * 2.5;

    sphere[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    sphere[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    sphere[i*3+2] = r * Math.cos(phi);
}

/* SPIRAL */
for (let i = 0; i < COUNT; i++) {
    const t = i / COUNT;
    const angle = t * Math.PI * 18;
    const radius = 0.5 + t * 12;
    const y = (t - 0.5) * 18;

    spiral[i*3]   = Math.cos(angle) * radius;
    spiral[i*3+1] = y;
    spiral[i*3+2] = Math.sin(angle) * radius;
}

pos.set(cloud);

const geometry = new THREE.BufferGeometry();
geometry.setAttribute("position", new THREE.BufferAttribute(pos, 3));

const material = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    uniforms: {
        uSize: { value: 0.25 },
        uInnerColor: { value: new THREE.Color(0xff66cc) },
        uOuterColor: { value: new THREE.Color(0x66ccff) },
        uSphereScale: { value: 1.0 },
        uMorph: { value: 0.0 }
    },
    vertexShader: `
        uniform float uSize;
        uniform float uSphereScale;
        varying float vDist;

        void main() {
            vDist = length(position) / (14.0 * uSphereScale);

            vec4 mv = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = uSize * (300.0 / -mv.z);
            gl_Position = projectionMatrix * mv;
        }
    `,
    fragmentShader: `
        uniform vec3 uInnerColor;
        uniform vec3 uOuterColor;
        uniform float uMorph;
        varying float vDist;

        void main() {
            if (length(gl_PointCoord - 0.5) > 0.5) discard;

            float g = smoothstep(0.2, 1.0, vDist);
            vec3 color = mix(uInnerColor, uOuterColor, g * uMorph);

            gl_FragColor = vec4(color, 0.75);
        }
    `
});


const particles = new THREE.Points(geometry, material);
scene.add(particles);

/* ================= STATE ================= */
let morph = 0;
let morphTarget = 0;
let sphereScale = 1;
let sphereScaleTarget = 1;
let hueSmooth = 0.75;
let spiralMix = 0;
let spiralTarget = 0;
let spiralTight = 1;
let spiralTightTarget = 1;
let burst = 0;
let burstTarget = 0;

/* ================= ANIMATE ================= */
function animate() {
    requestAnimationFrame(animate);

    morph += (morphTarget - morph) * 0.08;
    sphereScale += (sphereScaleTarget - sphereScale) * 0.06;
    spiralMix += (spiralTarget - spiralMix) * 0.08;
    spiralTight += (spiralTightTarget - spiralTight) * 0.08;
    burst += (burstTarget - burst) * 0.08;

    for (let i = 0; i < COUNT; i++) {
        const cx = cloud[i*3];
	const cy = cloud[i*3+1];
	const cz = cloud[i*3+2];

	const sx = sphere[i*3] * sphereScale;
	const sy = sphere[i*3+1] * sphereScale;
	const sz = sphere[i*3+2] * sphereScale;

	const px = spiral[i*3] * spiralTight;
	const py = spiral[i*3+1];
	const pz = spiral[i*3+2] * spiralTight;

	const mix1x = THREE.MathUtils.lerp(cx, sx, morph);
	const mix1y = THREE.MathUtils.lerp(cy, sy, morph);
	const mix1z = THREE.MathUtils.lerp(cz, sz, morph);

	pos[i*3]   = THREE.MathUtils.lerp(mix1x, px, spiralMix);
	pos[i*3+1] = THREE.MathUtils.lerp(mix1y, py, spiralMix);
	pos[i*3+2] = THREE.MathUtils.lerp(mix1z, pz, spiralMix);

	pos[i*3]   += burstDir[i*3]   * burst * 35;
	pos[i*3+1] += burstDir[i*3+1] * burst * 35;
	pos[i*3+2] += burstDir[i*3+2] * burst * 35;

    }

    geometry.attributes.position.needsUpdate = true;

    if (morph > 0.6) {
        particles.rotation.y += 0.002;
        particles.rotation.x += 0.001;
    }

    if (spiralMix > 0.6) {
    particles.rotation.y += 0.09;
    }

    material.uniforms.uSphereScale.value = sphereScale;
    material.uniforms.uMorph.value = morph;


    renderer.render(scene, camera);
}
animate();

/* ================= MEDIAPIPE ================= */
const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${f}`
});

hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.7
});

hands.onResults(res => {
    if (!res.multiHandLandmarks?.length) return;

    const h1 = res.multiHandLandmarks[0];
    const tip1 = h1[8];

    let centerX = tip1.x;
    let centerY = tip1.y;

    if (res.multiHandLandmarks.length > 1) {
        const tip2 = res.multiHandLandmarks[1][8];

        centerX = (tip1.x + tip2.x) * 0.5;
        centerY = (tip1.y + tip2.y) * 0.5;
    }

    particles.position.set(
        (centerX - 0.5) * 130,
        (0.5 - centerY) * 70,
        0
    );


    /* HAND STATE LOGIC (0 / 1 / 2 HANDS OPEN) */
    let openHands = 0;

    res.multiHandLandmarks.forEach(hand => {
        const thumb = hand[4];
        const pinky = hand[20];

        const openness = Math.hypot(
            thumb.x - pinky.x,
            thumb.y - pinky.y
        );

        if (openness > 0.25) openHands++;
    });

    /* SHAPE CONTROL */
    if (openHands === 1) {
        spiralTarget = 1;   // ONE HAND → SPIRAL
        morphTarget = 0;
    }
    else if (openHands === 2) {
        spiralTarget = 0;
        morphTarget = 1;   // TWO HANDS → SPHERE
    }
    else {
        spiralTarget = 0;
        morphTarget = 0;   // CLOSED → CLOUD
    }

    if (openHands === 1) {
    const hand = res.multiHandLandmarks.find(h => {
        const t = h[4], p = h[20];
        return Math.hypot(t.x - p.x, t.y - p.y) > 0.25;
    });

    if (hand) {
        const thumb = hand[4];
        const index = hand[8];

        const pinch = Math.hypot(
            thumb.x - index.x,
            thumb.y - index.y
        );

        spiralTightTarget = THREE.MathUtils.clamp(
            pinch * 8,
            0.35,
            1.6
        );
    }
} else {
    spiralTightTarget = 1;
}



/* SPHERE SIZE ONLY WHEN 2 HANDS */
if (res.multiHandLandmarks.length === 2) {
    const t1 = res.multiHandLandmarks[0][8];
    const t2 = res.multiHandLandmarks[1][8];

    const d = Math.hypot(
        t1.x - t2.x,
        t1.y - t2.y
    );

    sphereScaleTarget = THREE.MathUtils.clamp(d * 5.5, 0.2, 3.0);
}


let okHands = 0;

res.multiHandLandmarks.forEach(hand => {
    const thumb = hand[4];
    const index = hand[8];
    const pinky = hand[20];

    const pinch = Math.hypot(
        thumb.x - index.x,
        thumb.y - index.y
    );

    const spread = Math.hypot(
        index.x - pinky.x,
        index.y - pinky.y
    );

    if (pinch < 0.05 && spread > 0.15) {
        okHands++;
    }
});

if (okHands === 2) {
    burstTarget = 1;
}


if (res.multiHandLandmarks.length === 2) {
    const h1 = res.multiHandLandmarks[0][8];
    const h2 = res.multiHandLandmarks[1][8];

    const dx = Math.abs(h1.x - h2.x);
    const dy = Math.abs(h1.y - h2.y);

    // Hands cross horizontally
    if (dx < 0.04 && dy < 0.12) {
        burstTarget = 0;
    }
}


    /* SLOW COLOR */
    const hueTarget = THREE.MathUtils.clamp(
        0.9 - tip1.y * 0.6,
        0.20,
        1.40
    );

    hueSmooth += (hueTarget - hueSmooth) * 0.06;
    
const outerHue = THREE.MathUtils.clamp(
    -0.2 + sphereScale * 0.5,
    0.0,
    0.66
);

material.uniforms.uInnerColor.value.setHSL(hueSmooth, 1, 0.6);
material.uniforms.uOuterColor.value.setHSL(outerHue, 1, 0.6);

});

/* ================= LOOP ================= */
async function loop() {
    if (video.readyState === 4) {
        await hands.send({ image: video });
    }
    requestAnimationFrame(loop);
}
video.addEventListener("playing", loop);

/* ================= RESIZE ================= */
addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
